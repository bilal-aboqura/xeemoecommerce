# Nginx reverse proxy for Xeemo ecommerce.
# Place this at nginx/default.conf. Certs at nginx/certs/fullchain.pem + privkey.pem.
# Use certbot to generate Let's Encrypt certs (see deploy guide).

# Rate limit zone for API + checkout (prevent abuse)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream xeemo_app {
  server web:3000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name xeemo-eg.com www.xeemo-eg.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name xeemo-eg.com www.xeemo-eg.com;

    # SSL (Let's Encrypt via certbot)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload (product images via admin)
    client_max_body_size 10M;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://xeemo_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Kashier webhook — no rate limit (Kashier needs reliable delivery)
    location = /api/kashier/webhook {
        proxy_pass http://xeemo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes — rate limited
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://xeemo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else
    location / {
        proxy_pass http://xeemo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
